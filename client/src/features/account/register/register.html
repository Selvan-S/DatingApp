<div class="card bg-base-100 w-1/2 mx-auto flex-col p-6 rounded-lg shadow-lg">
  <div class="card-title justify-center text-3xl text-primary">Sign up</div>
  <div class="card-body w-full">
    <form [formGroup]="registerForm" (ngSubmit)="register()" class="flex flex-col gap-4 w-full">
      <div class="form-control w-full">
        <label class="floating-label">
          <span>Email</span>
          <input
            type="email"
            formControlName="email"
            class="input input-bordered w-full"
            placeholder="Email"
          />
        </label>
      </div>
      <div class="form-control w-full">
        <label class="floating-label text-left">
          <span>DisplayName</span>
          <input
            type="text"
            formControlName="displayName"
            class="input input-bordered w-full"
            [class.input-error]="registerForm.controls['displayName'].invalid && registerForm.controls['displayName'].touched"
            placeholder="Display Name"
          />
          @if (registerForm.controls['displayName'].invalid && registerForm.controls['displayName'].touched) {
            <div class="text-error text-xs">Display Name is required.</div>
          }
        </label>
      </div>
      <div class="form-control w-full">
        <label class="floating-label">
          <span>Password</span>
          <input
            type="password"
            formControlName="password"
            class="input input-bordered w-full"
            placeholder="Password"
          />
        </label>
      </div>
      <div class="form-control w-full">
        <label class="floating-label">
          <span>Confirm Password</span>
          <input
            type="password"
            formControlName="confirmPassword"
            class="input input-bordered w-full"
            placeholder="Confirm Password"
          />
        </label>
      </div>
      <div class="flex items-center justify-end gap-3">
        <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
        <button
        [disabled]="!registerForm.valid"
        type="submit" class="btn btn-primary">Register</button>
      </div>

      <div class="flex flex-col items-start px-3 w-full mockup-code text-lg">
        <div>Form value: {{ registerForm.value | json }}</div>
        <div>Form status: {{ registerForm.status | json }}</div>
      </div>
    </form>
  </div>
</div>
