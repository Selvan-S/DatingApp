<div class="card bg-base-100 w-1/2 mx-auto flex-col p-6 rounded-lg shadow-lg">
  <div class="card-title justify-center text-3xl text-primary">Sign up</div>
  <div class="card-body w-full">

    <ul class="steps">
      <li class="step step-primary" [class.step-primary]="currentStep() === 1">Credentials</li>
      <li class="step" [class.step-primary]="currentStep() === 2">Profile</li>
    </ul>

    @if (currentStep() === 1) {
      <form
        [formGroup]="credentialsForm"
        class="flex flex-col gap-4 w-full steps"
      >
        <div class="form-control w-full" class="mt-2">
          <app-text-input lable="Email" formControlName="email" type="email" />
        </div>
        <div class="form-control w-full">
          <app-text-input lable="Display Name" formControlName="displayName" />
        </div>
        <div class="form-control w-full">
          <app-text-input lable="Password" formControlName="password" type="password" />
        </div>
        <div class="form-control w-full">
          <app-text-input
            lable="Confirm Password"
            formControlName="confirmPassword"
            type="password"
          />
        </div>
        <div class="flex items-center justify-end gap-3">
          <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
          <button
            [disabled]="!credentialsForm.valid"
            (click)="nextStep()"
            type="button"
            class="btn btn-primary"
          >
            Next
          </button>
        </div>
      </form>
    }

    @if (currentStep() === 2) {
      <form
        [formGroup]="profileForm"
        class="flex flex-col gap-4 w-full steps"
      >
        <!-- Additional profile fields go here -->
        <div class="flex items-center justify-end gap-3">
          <button type="button" class="btn btn-secondary" (click)="prevStep()">Previous</button>
          <button
            [disabled]="!profileForm.valid"
            (click)="register()"
            type="button"
            class="btn btn-primary"
          >
            Register
          </button>
        </div>
      </form>
    }
    <div class="flex flex-col items-start px-3 w-full mockup-code text-lg">
      <div>Form value: {{ credentialsForm.value | json }}</div>
      <div>Form status: {{ credentialsForm.status | json }}</div>
      <div>Profile value: {{ profileForm.value | json }}</div>
      <div>Profile status: {{ profileForm.status | json }}</div>
    </div>
  </div>
</div>
