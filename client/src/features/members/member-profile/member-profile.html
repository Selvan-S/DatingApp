@if (memberService.member(); as member) {
  <div class="flex flex-col gap-3">
    <div class="flex gap-3">
      <span class="font-semibold">Member since: </span>
      <span>
        {{ member.created | date: 'longDate' }}
      </span>
    </div>
    <div class="flex gap-3">
      <span class="font-semibold">Last active: </span>
      <span>
        {{ member.lastActive | date: 'dd MMM yyyy h:mm a' }}
      </span>
    </div>
    <h3 class="text-lg font-semibold text-primary">About {{ member.displayName }}</h3>
    @if (memberService.editMode()) {
      <form #editForm="ngForm" (ngSubmit)="updateProfile()">
        <div class="flex flex-col w-full gap-4">
          <label for="displayName" class="floating-label font-semibold">
            <span>Display Name</span>
            <input
              type="text"
              id="displayName"
              name="displayName"
              [(ngModel)]="editableMember.displayName"
              placeholder="Display name"
              class="input border border-gray-300 rounded p-2 w-full"
              required
            />
          </label>
          <label for="description" class="floating-label font-semibold">
            <span>Description</span>
            <textarea
              id="description"
              name="description"
              [(ngModel)]="editableMember.description"
              placeholder="Description"
              class="w-full border border-gray-300 rounded p-2"
              rows="4"
            ></textarea>
          </label>
          <label for="city" class="floating-label font-semibold">
            <span>City</span>
            <input
              type="text"
              id="city"
              name="city"
              [(ngModel)]="editableMember.city"
              placeholder="City"
              class="w-full border border-gray-300 rounded p-2"
            />
          </label>
          <label for="country" class="floating-label font-semibold">
            <span>Country</span>
            <input
              type="text"
              id="country"
              name="country"
              [(ngModel)]="editableMember.country"
              placeholder="Country"
              class="w-full border border-gray-300 rounded p-2"
            />
          </label>

          <button
            type="submit"
            [disabled]="editForm.invalid || editForm.pristine"
            class="bg-primary text-white px-4 py-2 rounded disabled:bg-gray-400 disabled:cursor-not-allowed mt-3 transition duration-200 hover:bg-primary-dark disabled:hover:bg-gray-400 self-end"
          >
            Save Changes
          </button>
        </div>
      </form>
    } @else {
      <div>{{ member.description }}</div>
    }
  </div>
}
