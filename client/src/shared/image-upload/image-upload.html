<div class="flex w-full gap-6 min-h-100">
  <div class="flex items-center gap-4 w-2/3">
    <label
      for="dropzone-file"
      class="flex flex-col items-center justify-center w-full h-full border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100"
    >
      <p class="flex flex-col items-center justify-center pt-5 pb-6">
        <input type="file" id="dropzone-file" class="hidden" />
        <svg
          aria-hidden="true"
          class="w-10 h-10 mb-3 text-gray-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1116.9 9h1.1A3 3 0 0119 15.9M15 13l-3-3m0 0l-3 3m3-3v12"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
          ></path>
        </svg>
        <span class="text-sm text-gray-500">Click to upload or drag and drop</span>
      </p></label
    >
  </div>
  <div class="flex flex-col gap-4 w-1/3">
    <div class="flex justify-center border-2 border-gray-300 rounded-lg">
      <img src="/user.png" alt="image of member" class="rounded-lg object-cover aspect-square" />
    </div>
    <div class="flex w-full gap-3">
      <button class="btn flex-1">Cancel</button>
      <button class="btn btn-primary flex-1">Upload Image</button>
  </div>
</div>
